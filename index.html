<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Conduction: Speed Race</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        canvas { background: #000; border: 2px solid #444; border-radius: 8px; }
        .ui-box { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-top: 15px; width: 800px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        #btn-h2 { background: #4caf50; color: white; }
        #btn-n2 { background: #2196f3; color: white; }
        #btn-mode { background: #9c27b0; color: white; }
        #btn-reset { background: #f44336; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        .stats { display: flex; justify-content: space-around; font-family: monospace; font-size: 16px; color: #00ffcc; padding: 10px; background: #000; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>Thermal Conduction: Molecular Speed Race</h2>
    <canvas id="canvas" width="800" height="400"></canvas>

    <div class="ui-box">
        <div class="btn-row">
            <button id="btn-h2">LOAD HYDROGEN (H₂)</button>
            <button id="btn-n2">LOAD NITROGEN (N₂)</button>
            <button id="btn-mode">TOGGLE QUANTUM MODE</button>
            <button id="btn-reset">RESET HEAT</button>
        </div>
        <div class="stats">
            <span>GAS: <b id="stat-gas">-</b></span>
            <span>MODE: <b id="stat-mode">CLASSICAL</b></span>
            <span>AVG SPEED: <b id="stat-speed">0</b></span>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let mode = 'CLASSICAL'; // 'CLASSICAL' or 'QUANTUM'
    let gasType = 'H2';
    let particles = [];
    const count = 70;

    const config = {
        'H2': { mass: 2, color: '#88ff88', radius: 3, speed: 6 },
        'N2': { mass: 28, color: '#8888ff', radius: 6, speed: 1.5 }
    };

    function createParticles() {
        particles = [];
        const c = config[gasType];
        for(let i=0; i<count; i++) {
            particles.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: Math.random() * (canvas.height - 40) + 20,
                vx: (Math.random() - 0.5) * c.speed,
                vy: (Math.random() - 0.5) * c.speed,
                mass: c.mass,
                radius: c.radius,
                color: c.color
            });
        }
        document.getElementById('stat-gas').innerText = gasType;
    }

    function update() {
        ctx.fillStyle = 'rgba(0,0,0,0.2)'; // Trail effect
        ctx.fillRect(0,0,canvas.width, canvas.height);

        // Draw Walls
        ctx.fillStyle = '#ff4444'; ctx.fillRect(0,0,10,400); // HOT
        ctx.fillStyle = '#4444ff'; ctx.fillRect(790,0,10,400); // COLD

        let speedSum = 0;

        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;

            // Classical Collision / Heat Transfer
            if (p.x < 10) {
                p.vx = Math.abs(p.vx) + (Math.random() * 2); // Gain energy from hot wall
                p.x = 10;
            }
            if (p.x > 790) {
                p.vx = -Math.abs(p.vx) * 0.7; // Lose energy to cold wall
                p.x = 790;
            }
            if (p.y < 0 || p.y > 400) p.vy *= -1;

            // Quantum Behavior
            if (mode === 'QUANTUM') {
                p.x += (Math.random() - 0.5) * 3; // Position Uncertainty
                if (Math.random() > 0.995) p.x = Math.random() * 800; // Tunneling
            }

            // Draw
            ctx.beginPath();
            if (mode === 'CLASSICAL') {
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fillStyle = p.color;
            } else {
                // Quantum Wave Packet Visualization
                let grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius*4);
                grad.addColorStop(0, p.color);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.arc(p.x, p.y, p.radius*4, 0, Math.PI*2);
            }
            ctx.fill();
            speedSum += Math.sqrt(p.vx**2 + p.vy**2);
        });

        document.getElementById('stat-speed').innerText = (speedSum / count).toFixed(2);
        requestAnimationFrame(update);
    }

    // Attach Listeners directly
    document.getElementById('btn-h2').addEventListener('click', () => { gasType = 'H2'; createParticles(); });
    document.getElementById('btn-n2').addEventListener('click', () => { gasType = 'N2'; createParticles(); });
    document.getElementById('btn-reset').addEventListener('click', () => { createParticles(); });
    document.getElementById('btn-mode').addEventListener('click', () => {
        mode = (mode === 'CLASSICAL') ? 'QUANTUM' : 'CLASSICAL';
        document.getElementById('stat-mode').innerText = mode;
        createParticles();
    });

    // Start
    createParticles();
    update();
</script>
</body>
</html>
