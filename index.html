<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermal Conduction: Molecular Speed Race</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #111; color: #e8e8e8; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; min-height: 100vh; }
    h1 { font-size: 18px; font-weight: 500; color: #f0f0f0; margin-bottom: 4px; letter-spacing: 0.01em; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 12px; text-align: center; }
    #sim-wrap { width: 100%; max-width: 820px; }
    .legend-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; font-size: 12px; color: #999; }
    .legend { display: flex; gap: 14px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
    canvas { display: block; width: 100%; border-radius: 8px; border: 1px solid #2a2a2a; }
    .controls { background: #1a1a1a; border-radius: 12px; border: 1px solid #2a2a2a; padding: 14px 16px; margin-top: 10px; }
    .btn-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    button { flex: 1; min-width: 100px; padding: 9px 6px; border-radius: 8px; border: 1px solid #333; background: #222; color: #e0e0e0; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    button:hover { background: #2d2d2d; }
    button:active { transform: scale(0.97); }
    button.active-h2 { background: #0F6E56; color: #fff; border-color: #1D9E75; }
    button.active-n2 { background: #0C447C; color: #fff; border-color: #378ADD; }
    button.active-q  { background: #3C3489; color: #fff; border-color: #7F77DD; }
    #b-add { border-color: #555; background: #333; }
    .sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; margin-bottom: 12px; }
    .slider-group label { font-size: 12px; color: #999; display: block; margin-bottom: 5px; }
    .slider-group .val { font-weight: 500; color: #e0e0e0; }
    input[type=range] { width: 100%; -webkit-appearance: none; height: 4px; border-radius: 2px; background: #333; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #aaa; border: none; cursor: pointer; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .stat { background: #111; border-radius: 8px; border: 1px solid #2a2a2a; padding: 8px 10px; }
    .stat-label { font-size: 11px; color: #666; margin-bottom: 2px; }
    .stat-value { font-size: 15px; font-weight: 500; font-family: 'Courier New', monospace; color: #e0e0e0; }
    .science-note { margin-top: 12px; padding: 10px 14px; background: #161616; border-left: 3px solid #3C3489; border-radius: 0 8px 8px 0; font-size: 12px; color: #888; line-height: 1.6; }
    @media (max-width: 560px) { .sliders { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

<h1>Thermal Conduction: Molecular Speed Race</h1>
<p class="subtitle">v<sub>rms</sub> = √(3k<sub>B</sub>T/m) — lighter molecules move faster at the same temperature</p>

<div id="sim-wrap">
  <div class="legend-row">
    <div class="legend">
      <span><span class="dot" style="background:#1D9E75"></span>H₂</span>
      <span><span class="dot" style="background:#378ADD"></span>N₂</span>
    </div>
    <div style="font-size:11px;color:#666;">
      <span style="color:#E24B4A;font-weight:500">■</span> Hot wall &nbsp;
      <span style="color:#378ADD;font-weight:500">■</span> Cold wall
    </div>
  </div>

  <canvas id="c" height="320"></canvas>

  <div class="controls">
    <div class="btn-row">
      <button id="bh2" class="active-h2" onclick="loadGas('H2')">H₂ Hydrogen</button>
      <button id="bn2" onclick="loadGas('N2')">N₂ Nitrogen</button>
      <button id="bq" onclick="toggleQuantum()">Quantum mode</button>
      <button id="b-add" onclick="addParticles(10)">+10 Balls</button>
      <button onclick="resetSim()">Reset</button>
    </div>

    <div class="sliders">
      <div class="slider-group">
        <label>Particle density — <span class="val" id="lbl-density">60</span></label>
        <input type="range" min="20" max="150" value="60" step="1" id="sl-density" oninput="updateDensity(this.value)">
      </div>
      <div class="slider-group">
        <label>Heat source temp — <span class="val" id="lbl-heat">medium</span></label>
        <input type="range" min="1" max="5" value="3" step="1" id="sl-heat" oninput="updateHeat(this.value)">
      </div>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-label">Gas</div><div class="stat-value" id="sv-gas">H₂</div></div>
      <div class="stat"><div class="stat-label">Mode</div><div class="stat-value" id="sv-mode">classical</div></div>
      <div class="stat"><div class="stat-label">Avg speed</div><div class="stat-value" id="sv-speed">0.00</div></div>
      <div class="stat"><div class="stat-label">Particles</div><div class="stat-value" id="sv-count">60</div></div>
    </div>
  </div>
</div>

<script>
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  const W = 800, H = 320;
  cv.width = W; cv.height = H;

  let gas = 'H2', quantum = false, particles = [];
  let heatLevel = 3, count = 60, frame = 0;

  const GAS = {
    H2: { color: '#1D9E75', r: 3.5, label: 'H₂' },
    N2: { color: '#378ADD', r: 6,   label: 'N₂' }
  };
  const HEAT_LABELS = ['very low', 'low', 'medium', 'high', 'very high'];
  const HEAT_BOOST  = [0.6, 1.0, 1.8, 3.0, 5.0];
  const WALL = 14;

  function baseSpeed() {
    const boost = HEAT_BOOST[heatLevel - 1];
    return gas === 'H2' ? 5 * boost : 1.3 * boost;
  }

  function spawn() {
    particles = [];
    addParticles(count, true);
  }

  function addParticles(amt, isReset = false) {
    if(!isReset) count += amt;
    const sp = baseSpeed();
    const g = GAS[gas];
    
    // Expand slider range if we exceed original max
    if (count > 150) document.getElementById('sl-density').max = count;

    for (let i = 0; i < amt; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = sp * (0.6 + Math.random() * 0.8);
      particles.push({
        x: WALL + 20 + Math.random() * (W - 2 * WALL - 40),
        y: 20 + Math.random() * (H - 40),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed
      });
    }
    updateUI();
  }

  function updateUI() {
    document.getElementById('lbl-density').textContent = count;
    document.getElementById('sv-count').textContent = count;
    document.getElementById('sl-density').value = count;
  }

  function loadGas(g) {
    gas = g;
    document.getElementById('bh2').className = g === 'H2' ? 'active-h2' : '';
    document.getElementById('bn2').className = g === 'N2' ? 'active-n2' : '';
    document.getElementById('sv-gas').textContent = GAS[g].label;
    spawn();
  }

  function toggleQuantum() {
    quantum = !quantum;
    document.getElementById('bq').className = quantum ? 'active-q' : '';
    document.getElementById('sv-mode').textContent = quantum ? 'quantum' : 'classical';
  }

  function resetSim() { count = 60; document.getElementById('sl-density').max = 150; spawn(); }

  function updateDensity(v) {
    count = +v;
    spawn();
  }

  function updateHeat(v) {
    heatLevel = +v;
    document.getElementById('lbl-heat').textContent = HEAT_LABELS[heatLevel - 1];
    const sp = baseSpeed();
    particles.forEach(p => {
        const angle = Math.atan2(p.vy, p.vx);
        const curSp = sp * (0.8 + Math.random() * 0.4);
        p.vx = Math.cos(angle) * curSp;
        p.vy = Math.sin(angle) * curSp;
    });
  }

  function draw() {
    frame++;
    ctx.clearRect(0, 0, W, H);
    
    // Background and Walls
    const bg = ctx.createLinearGradient(0, 0, W, 0);
    bg.addColorStop(0, 'rgba(226,75,74,0.08)'); bg.addColorStop(0.4, 'rgba(0,0,0,0)');
    bg.addColorStop(0.6, 'rgba(0,0,0,0)'); bg.addColorStop(1, 'rgba(55,138,221,0.08)');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#E24B4A'; ctx.fillRect(0, 0, WALL, H);
    ctx.fillStyle = '#378ADD'; ctx.fillRect(W - WALL, 0, WALL, H);

    // Particles logic
    let speedSum = 0;
    const g = GAS[gas];
    const boost = HEAT_BOOST[heatLevel - 1];

    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x - g.r < WALL) { p.vx = Math.abs(p.vx) + Math.random() * boost; p.x = WALL + g.r; }
      if (p.x + g.r > W - WALL) { p.vx = -Math.abs(p.vx) * 0.7; p.x = W - WALL - g.r; }
      if (p.y - g.r < 0 || p.y + g.r > H) p.vy *= -1;

      const spd = Math.sqrt(p.vx ** 2 + p.vy ** 2);
      speedSum += spd;

      if (quantum) {
        ctx.fillStyle = g.color + '44';
        ctx.beginPath(); ctx.arc(p.x, p.y, g.r * 3, 0, Math.PI * 2); ctx.fill();
      }
      ctx.fillStyle = g.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, g.r, 0, Math.PI * 2); ctx.fill();
    });

    document.getElementById('sv-speed').textContent = (speedSum / count).toFixed(2);
    requestAnimationFrame(draw);
  }

  spawn();
  draw();
</script>
</body>
</html>
