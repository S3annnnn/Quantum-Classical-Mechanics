<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Conduction: Classical vs Quantum</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #0a0a0a; color: #00ff41; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        canvas { background: #000; border: 2px solid #333; border-radius: 4px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); }
        .dashboard { background: #111; padding: 20px; border-radius: 8px; margin-top: 20px; width: 800px; border: 1px solid #333; }
        .controls { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .btn { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; font-family: inherit; transition: all 0.2s; }
        .btn-h2 { background: #2e7d32; color: white; }
        .btn-n2 { background: #1565c0; color: white; }
        .btn-mode { background: #6a1b9a; color: white; border: 1px solid #9c27b0; }
        .btn-reset { background: #c62828; color: white; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .stats { display: flex; justify-content: space-around; font-size: 0.9em; border-top: 1px solid #333; padding-top: 10px; }
        .label { color: #888; font-size: 0.8em; margin-bottom: 5px; text-transform: uppercase; }
        .mode-indicator { color: #ea80fc; font-weight: bold; }
    </style>
</head>
<body>

    <h2>THERMAL CONDUCTION SIMULATOR</h2>
    
    <canvas id="simCanvas" width="800" height="400"></canvas>

    <div class="dashboard">
        <div class="controls">
            <div style="flex: 2; display: flex; gap: 10px;">
                <button class="btn btn-h2" onclick="engine.setGas('H2')">LOAD H2 (LIGHT)</button>
                <button class="btn btn-n2" onclick="engine.setGas('N2')">LOAD N2 (HEAVY)</button>
            </div>
            <button class="btn btn-mode" onclick="engine.toggleMode()" id="modeToggle">SWITCH TO QUANTUM</button>
            <button class="btn btn-reset" onclick="engine.reset()">RESET</button>
        </div>

        <div class="stats">
            <div>GAS: <span id="gasDisplay">H2</span></div>
            <div>PHYSICS: <span id="modeDisplay" class="mode-indicator">CLASSICAL</span></div>
            <div>AVG SPEED: <span id="speedDisplay">0</span> m/s</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    const engine = {
        mode: 'CLASSICAL',
        gas: 'H2',
        particles: [],
        running: true,

        config: {
            'H2': { mass: 2, color: '#4aff4a', radius: 3, speedMult: 4 },
            'N2': { mass: 28, color: '#4a9eff', radius: 6, speedMult: 1.2 }
        },

        init() {
            this.spawnParticles();
            this.animate();
        },

        spawnParticles() {
            this.particles = [];
            const settings = this.config[this.gas];
            for (let i = 0; i < 50; i++) {
                this.particles.push({
                    x: Math.random() * (canvas.width - 100) + 50,
                    y: Math.random() * (canvas.height - 40) + 20,
                    vx: (Math.random() - 0.5) * settings.speedMult,
                    vy: (Math.random() - 0.5) * settings.speedMult,
                    history: []
                });
            }
            document.getElementById('gasDisplay').innerText = this.gas;
        },

        setGas(type) {
            this.gas = type;
            this.spawnParticles();
        },

        toggleMode() {
            this.mode = (this.mode === 'CLASSICAL') ? 'QUANTUM' : 'CLASSICAL';
            document.getElementById('modeDisplay').innerText = this.mode;
            document.getElementById('modeToggle').innerText = 
                this.mode === 'CLASSICAL' ? "SWITCH TO QUANTUM" : "SWITCH TO CLASSICAL";
            this.spawnParticles();
        },

        reset() {
            this.spawnParticles();
        },

        drawEnvironment() {
            // Hot Wall
            const hotGrad = ctx.createLinearGradient(0, 0, 20, 0);
            hotGrad.addColorStop(0, '#ff1744');
            hotGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = hotGrad;
            ctx.fillRect(0, 0, 20, canvas.height);

            // Cold Wall
            const coldGrad = ctx.createLinearGradient(canvas.width, 0, canvas.width - 20, 0);
            coldGrad.addColorStop(0, '#2979ff');
            coldGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = coldGrad;
            ctx.fillRect(canvas.width - 20, 0, 20, canvas.height);
        },

        update() {
            const settings = this.config[this.gas];
            let totalSpeed = 0;

            this.particles.forEach(p => {
                if (this.mode === 'CLASSICAL') {
                    p.x += p.vx;
                    p.y += p.vy;

                    // Classical Collisions
                    if (p.x < 5) { p.vx = Math.abs(p.vx) + 0.5; p.x = 5; } // Heat kick
                    if (p.x > canvas.width - 5) { p.vx = -Math.abs(p.vx) * 0.8; p.x = canvas.width - 5; } // Cold drain
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                } else {
                    // Quantum Mode: Wave packet jitter + Tunneling
                    const jitter = (Math.random() - 0.5) * 2;
                    p.x += p.vx + jitter;
                    p.y += p.vy + (Math.random() - 0.5);

                    // Quantum Tunneling (Small chance to pass through walls)
                    if (p.x < 0 || p.x > canvas.width) {
                        if (Math.random() > 0.98) {
                            p.x = p.x < 0 ? canvas.width : 0;
                        } else {
                            p.vx *= -1;
                        }
                    }
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                }

                totalSpeed += Math.abs(p.vx) + Math.abs(p.vy);
            });

            document.getElementById('speedDisplay').innerText = (totalSpeed / this.particles.length).toFixed(2);
        },

        draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            this.drawEnvironment();

            const settings = this.config[this.gas];
            this.particles.forEach(p => {
                ctx.beginPath();
                if (this.mode === 'CLASSICAL') {
                    ctx.arc(p.x, p.y, settings.radius, 0, Math.PI * 2);
                    ctx.fillStyle = settings.color;
                    ctx.fill();
                } else {
                    // Probability Cloud visualization
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, settings.radius * 3);
                    grad.addColorStop(0, settings.color);
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.arc(p.x, p.y, settings.radius * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.closePath();
            });
        },

        animate() {
            engine.update();
            engine.draw();
            requestAnimationFrame(() => engine.animate());
        }
    };

    // Auto-start
    window.onload = () => engine.init();
</script>
</body>
</html>
