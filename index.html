<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Conduction: Molecular Speed Race</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #000; border: 2px solid #555; border-radius: 8px; cursor: crosshair; }
        .controls { background: #333; padding: 20px; border-radius: 8px; margin-top: 15px; display: flex; gap: 20px; align-items: center; }
        .stats { margin-top: 10px; font-family: monospace; color: #00ff00; }
        button { padding: 10px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .h2-btn { background: #4CAF50; color: white; }
        .n2-btn { background: #2196F3; color: white; }
        .reset-btn { background: #f44336; color: white; }
    </style>
</head>
<body>

    <h2>Thermal Conduction: Molecular Speed Race</h2>
    <p>Watch how molecular mass affects the rate of temperature equalization.</p>

    <canvas id="simCanvas" width="800" height="400"></canvas>

    <div class="controls">
        <div>
            <strong>Select Gas:</strong>
            <button class="h2-btn" onclick="initGas('H2')">Load Hydrogen (Light/Fast)</button>
            <button class="n2-btn" onclick="initGas('N2')">Load Nitrogen (Heavy/Slow)</button>
        </div>
        <button class="reset-btn" onclick="resetSim()">Reset Heat</button>
    </div>

    <div class="stats">
        Current Gas: <span id="gasName">None</span> | 
        Avg. Left Temp: <span id="leftTemp">0</span>K | 
        Avg. Right Temp: <span id="rightTemp">0</span>K
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        let particles = [];
        const numParticles = 80;
        let currentGas = 'H2';
        
        // Physical Constants (Scaled for simulation)
        const masses = { 'H2': 2, 'N2': 28 };
        const colors = { 'H2': '#88ff88', 'N2': '#8888ff' };
        
        class Particle {
            constructor(x, y, mass, color) {
                this.x = x;
                this.y = y;
                this.mass = mass;
                this.color = color;
                this.radius = mass === 2 ? 3 : 6;
                
                // Initial state: Cold (low velocity)
                const speed = 1.5 / Math.sqrt(this.mass); 
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Wall Collisions
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                
                // Left Wall (HOT - Red)
                if (this.x < 5) {
                    this.vx = Math.abs(this.vx) + (Math.random() * 2); // Kick energy in
                    this.x = 5;
                }
                
                // Right Wall (COLD - Blue)
                if (this.x > canvas.width - 5) {
                    this.vx = -Math.abs(this.vx) * 0.5; // Absorb energy
                    this.x = canvas.width - 5;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                // Glow based on speed
                const speed = Math.sqrt(this.vx**2 + this.vy**2);
                ctx.shadowBlur = speed * 2;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.closePath();
            }
        }

        function initGas(type) {
            currentGas = type;
            document.getElementById('gasName').innerText = type === 'H2' ? "Hydrogen (Light)" : "Nitrogen (Heavy)";
            particles = [];
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle(
                    Math.random() * (canvas.width - 20) + 1
